<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses | FinTrack</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <a href="dashboard.html" class="logo">FinTrack</a>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="expenses.html" class="active">Expenses</a>
        <a href="income.html">Income</a>
        <a href="goals.html">Goals</a>
        <a href="budgets.html">Budgets</a>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </nav>
</div>

<div class="container">
    <p class="page-title">Expenses</p>

    <!-- Add Expense Form -->
    <div class="card">
        <h3>Add Expense</h3>
        <div id="alert" class="alert" style="display:none;"></div>
        <div class="form-group">
            <label>Amount (₹)</label>
            <input type="number" id="amount" placeholder="e.g. 500">
        </div>
        <div class="form-group">
            <label>Category</label>
            <select id="category">
                <option value="">Select category</option>
                <option>Food</option>
                <option>Transport</option>
                <option>Shopping</option>
                <option>Entertainment</option>
                <option>Health</option>
                <option>Travel</option>
                <option>Education</option>
                <option>Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Description</label>
            <input type="text" id="description" placeholder="e.g. Lunch at restaurant">
        </div>
        <div class="form-group">
            <label>Date</label>
            <input type="date" id="date">
        </div>
        <button class="btn btn-primary" onclick="addExpense()">Add Expense</button>
    </div>

    <!-- Expense List -->
    <div class="card">
        <h3>All Expenses</h3>
        <div id="expenseList"><div class="empty-state">No expenses yet</div></div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';

    // Set today's date as default
    document.getElementById('date').valueAsDate = new Date();

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = 'login.html';
    }

    function showAlert(message, type = 'error') {
        const alert = document.getElementById('alert');
        alert.textContent = message;
        alert.className = `alert alert-${type}`;
        alert.style.display = 'block';
        setTimeout(() => alert.style.display = 'none', 3000);
    }

    async function loadExpenses() {
        try {
            const res = await fetch('http://localhost:5000/api/expenses', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();

            if (data.length === 0) {
                document.getElementById('expenseList').innerHTML = '<div class="empty-state">No expenses yet</div>';
                return;
            }

            document.getElementById('expenseList').innerHTML = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Category</th>
                            <th>Description</th>
                            <th>Amount</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.map(e => `
                            <tr>
                                <td>${new Date(e.date).toLocaleDateString('en-IN')}</td>
                                <td>${e.category}</td>
                                <td>${e.description || '—'}</td>
                                <td>₹${e.amount.toLocaleString('en-IN')}</td>
                                <td><button class="btn btn-danger" onclick="deleteExpense('${e._id}')">Delete</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        } catch (err) {
            console.error(err);
        }
    }

    async function addExpense() {
        const amount = document.getElementById('amount').value;
        const category = document.getElementById('category').value;
        const description = document.getElementById('description').value;
        const date = document.getElementById('date').value;

        if (!amount || !category || !date) {
            showAlert('Please fill in all required fields.');
            return;
        }

        try {
            const res = await fetch('http://localhost:5000/api/expenses', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ amount, category, description, date })
            });

            const data = await res.json();
            if (!res.ok) {
                showAlert(data.message || 'Failed to add expense.');
                return;
            }

            showAlert('Expense added successfully!', 'success');
            document.getElementById('amount').value = '';
            document.getElementById('description').value = '';
            document.getElementById('category').value = '';
            loadExpenses();
        } catch (err) {
            showAlert('Server error. Please try again.');
        }
    }

    async function deleteExpense(id) {
        if (!confirm('Delete this expense?')) return;
        try {
            await fetch(`http://localhost:5000/api/expenses/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            loadExpenses();
        } catch (err) {
            console.error(err);
        }
    }

    loadExpenses();
</script>

</body>
</html>
