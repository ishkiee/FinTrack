<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | FinTrack</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-box">
        <h2>Create Account 🌱</h2>

        <div id="alert" class="alert alert-error" style="display:none;"></div>

        <div class="form-group">
            <label>Name</label>
            <input type="text" id="name" placeholder="Your name">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Min 6 characters">
        </div>

        <button class="btn btn-primary" style="width:100%;" onclick="register()">Register</button>

        <div class="switch">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>
</div>

<script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) {
        window.location.href = 'dashboard.html';
    }

    async function register() {
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const alertBox = document.getElementById('alert');

        alertBox.style.display = 'none';

        if (!name || !email || !password) {
            alertBox.textContent = 'Please fill in all fields.';
            alertBox.style.display = 'block';
            return;
        }

        if (password.length < 6) {
            alertBox.textContent = 'Password must be at least 6 characters.';
            alertBox.style.display = 'block';
            return;
        }

        try {
            const res = await fetch('http://localhost:5000/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });

            const data = await res.json();

            if (!res.ok) {
                alertBox.textContent = data.message || 'Registration failed.';
                alertBox.style.display = 'block';
                return;
            }

            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            window.location.href = 'dashboard.html';

        } catch (err) {
            alertBox.textContent = 'Server error. Please try again.';
            alertBox.style.display = 'block';
        }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') register();
    });
</script>

</body>
</html>
