<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FinTrack</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-box">
        <h2>Welcome Back 👋</h2>

        <div id="alert" class="alert alert-error" style="display:none;"></div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn btn-primary" style="width:100%;" onclick="login()">Login</button>

        <div class="switch">
            Don't have an account? <a href="register.html">Register</a>
        </div>
    </div>
</div>

<script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) {
        window.location.href = 'dashboard.html';
    }

    async function login() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const alert = document.getElementById('alert');

        if (!email || !password) {
            alert.textContent = 'Please fill in all fields.';
            alert.style.display = 'block';
            return;
        }

        try {
            const res = await fetch('http://localhost:5000/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (!res.ok) {
                alert.textContent = data.message || 'Login failed.';
                alert.style.display = 'block';
                return;
            }

            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            window.location.href = 'dashboard.html';

        } catch (err) {
            alert.textContent = 'Server error. Please try again.';
            alert.style.display = 'block';
        }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') login();
    });
</script>

</body>
</html>
