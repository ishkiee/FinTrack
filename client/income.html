<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income | FinTrack</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <a href="dashboard.html" class="logo">FinTrack</a>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="expenses.html">Expenses</a>
        <a href="income.html" class="active">Income</a>
        <a href="goals.html">Goals</a>
        <a href="budgets.html">Budgets</a>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </nav>
</div>

<div class="container">
    <p class="page-title">Income</p>

    <!-- Add Income Form -->
    <div class="card">
        <h3>Add Income</h3>
        <div id="alert" class="alert" style="display:none;"></div>
        <div class="form-group">
            <label>Amount (₹)</label>
            <input type="number" id="amount" placeholder="e.g. 50000">
        </div>
        <div class="form-group">
            <label>Source</label>
            <select id="source">
                <option value="">Select source</option>
                <option>Salary</option>
                <option>Freelance</option>
                <option>Business</option>
                <option>Investment</option>
                <option>Gift</option>
                <option>Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Description</label>
            <input type="text" id="description" placeholder="Add description">
        </div>
        <div class="form-group">
            <label>Date</label>
            <input type="date" id="date">
        </div>
        <button class="btn btn-primary" onclick="addIncome()">Add Income</button>
    </div>

    <!-- Income List -->
    <div class="card">
        <h3>All Income</h3>
        <div id="incomeList"><div class="empty-state">No income added yet</div></div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';

    document.getElementById('date').valueAsDate = new Date();

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = 'login.html';
    }

    function showAlert(message, type = 'error') {
        const alert = document.getElementById('alert');
        alert.textContent = message;
        alert.className = `alert alert-${type}`;
        alert.style.display = 'block';
        setTimeout(() => alert.style.display = 'none', 3000);
    }

    async function loadIncome() {
        try {
            const res = await fetch('http://localhost:5000/api/income', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();

            if (data.length === 0) {
                document.getElementById('incomeList').innerHTML = '<div class="empty-state">No income added yet</div>';
                return;
            }

            document.getElementById('incomeList').innerHTML = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Source</th>
                            <th>Description</th>
                            <th>Amount</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.map(i => `
                            <tr>
                                <td>${new Date(i.date).toLocaleDateString('en-IN')}</td>
                                <td>${i.source}</td>
                                <td>${i.description || '—'}</td>
                                <td>₹${i.amount.toLocaleString('en-IN')}</td>
                                <td><button class="btn btn-danger" onclick="deleteIncome('${i._id}')">Delete</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        } catch (err) {
            console.error(err);
        }
    }

    async function addIncome() {
        const amount = document.getElementById('amount').value;
        const source = document.getElementById('source').value;
        const description = document.getElementById('description').value;
        const date = document.getElementById('date').value;

        if (!amount || !source || !date) {
            showAlert('Please fill in all required fields.');
            return;
        }

        try {
            const res = await fetch('http://localhost:5000/api/income', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ amount, source, description, date })
            });

            const data = await res.json();
            if (!res.ok) {
                showAlert(data.message || 'Failed to add income.');
                return;
            }

            showAlert('Income added successfully!', 'success');
            document.getElementById('amount').value = '';
            document.getElementById('description').value = '';
            document.getElementById('source').value = '';
            loadIncome();
        } catch (err) {
            showAlert('Server error. Please try again.');
        }
    }

    async function deleteIncome(id) {
        if (!confirm('Delete this income entry?')) return;
        try {
            await fetch(`http://localhost:5000/api/income/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            loadIncome();
        } catch (err) {
            console.error(err);
        }
    }

    loadIncome();
</script>

</body>
</html>
